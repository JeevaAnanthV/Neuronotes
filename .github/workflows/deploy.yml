name: Deploy

on:
  push:
    branches: [main]

# Required secrets:
#   VERCEL_TOKEN        — Vercel API token
#   VERCEL_ORG_ID       — Vercel team/org ID  (set in vercel project settings)
#   VERCEL_PROJECT_ID   — Vercel project ID
#   RAILWAY_TOKEN       — Railway API token
#
# Required variable (repo → Settings → Variables):
#   DEPLOY_ENABLED = true   (set to false to pause deployments without removing workflows)

jobs:
  # ── Guard: ensure CI passed before deploying ─────────────────────────────────
  ci-gate:
    name: Wait for CI
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Check CI workflow status
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "Backend Tests (pytest)"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15

      - name: Check frontend build status
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "Frontend Build Test"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15

  # ── Deploy: Frontend to Vercel ────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: [ci-gate]
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (Vercel-managed)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  # ── Deploy: Backend to Railway ────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Railway)
    runs-on: ubuntu-latest
    needs: [ci-gate]
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service neuronotes-backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
